---
layout: default
---
<article class="page-wrap">
  {%- if page.title -%}
  <header class="page-head">
    {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
  </header>
  {%- endif -%}
  <div class="prose">
    {{ content }}
  </div>
</article>
